services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ${FMCPA_SQL_CONTAINER_NAME:-fmcpa-sql}
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${FMCPA_SQL_SA_PASSWORD:-Fmcpadev123!Aa}
    ports:
      - "${FMCPA_SQL_PORT:-14333}:1433"
    volumes:
      - fmcpa-sql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  fmcpa-sql-data:
